<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Network Core | Dashboard</title>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --success-green: #10b981;
            --danger-red: #ef4444;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        h2 { 
            font-weight: 700; 
            letter-spacing: -0.025em; 
            margin-bottom: 30px; 
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Input Panel */
        .form-section {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        input {
            background: #0f172a;
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 8px;
            color: white;
            flex: 1;
            min-width: 150px;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .add-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-btn:hover { background: #2563eb; transform: translateY(-1px); }

        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .search-box { flex: 1; max-width: 400px; }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        /* Table Design */
        .table-container {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(0,0,0,0.2);
            color: var(--text-dim);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            padding: 16px 20px;
            letter-spacing: 0.05em;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .name-cell { font-weight: 600; color: #fff; }
        .sub-text { color: var(--text-dim); font-size: 12px; display: block; }

        /* Status Toggles (The Ticks) */
        .status-group { display: flex; gap: 8px; }

        .tick-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: transparent;
            font-size: 16px;
        }

        .tick-sent.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .tick-accepted.active {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--success-green);
            color: var(--success-green);
        }

        /* Actions */
        .action-btns { display: flex; gap: 10px; }
        .icon-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
        }
        .icon-btn:hover { color: var(--danger-red); background: rgba(239, 68, 68, 0.1); }
        .ln-link { color: var(--accent-blue); text-decoration: none; font-weight: 600; }

        /* Modal */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }

        .modal {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>

<div class="container">
    <h2>Network Management Dashboard</h2>

    <div class="form-section">
        <input type="text" id="newName" placeholder="Full Name">
        <input type="text" id="newCollege" placeholder="Organization/College">
        <input type="text" id="newPost" placeholder="Quality (e.g. High)">
        <input type="text" id="newLink" placeholder="LinkedIn URL">
        <button class="add-btn" onclick="addConnection()">Add Customer</button>
    </div>

    <div class="toolbar">
        <input type="text" class="search-box" id="searchInput" placeholder="Search by name or org..." onkeyup="filterTable()">
        <div style="display: flex; gap: 10px;">
            <button class="btn-outline" onclick="sortData()">Sort A-Z</button>
            <button class="btn-outline" onclick="exportData()">Export JSON</button>
        </div>
    </div>

    <div class="table-container">
        <table id="networkTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Organization</th>
                    <th>Quality</th>
                    <th>Status (Sent / Made)</th>
                    <th>LinkedIn</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>Remove Connection?</h3>
        <p style="color: var(--text-dim)">This record will be permanently deleted from local storage.</p>
        <div style="margin-top: 25px; display: flex; gap: 10px; justify-content: center;">
            <button class="add-btn" style="background: var(--danger-red)" id="confirmDelete">Delete</button>
            <button class="btn-outline" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let connections = JSON.parse(localStorage.getItem('masterNetwork')) || [];
    let deleteId = null;

    window.onload = renderAll;

    function addConnection() {
        const name = document.getElementById('newName').value;
        const college = document.getElementById('newCollege').value;
        const post = document.getElementById('newPost').value;
        const link = document.getElementById('newLink').value;

        if(!name) return alert("Name is required");

        const newEntry = {
            id: Date.now(),
            name,
            college,
            post: post || 'N/A',
            link,
            isSent: false,
            isMade: false
        };

        connections.push(newEntry);
        saveData();
        renderAll();
        
        // Clear inputs
        ['newName','newCollege','newPost','newLink'].forEach(id => document.getElementById(id).value = '');
    }

    function renderAll() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        connections.forEach(item => {
            const row = document.createElement('tr');
            row.setAttribute('data-id', item.id);
            row.innerHTML = `
                <td class="name-cell">${item.name}<span class="sub-text">ID: ${item.id.toString().slice(-6)}</span></td>
                <td>${item.college}</td>
                <td><span style="color: ${item.post.toLowerCase() === 'high' ? '#8b5cf6' : '#94a3b8'}">${item.post}</span></td>
                <td>
                    <div class="status-group">
                        <button class="tick-circle tick-sent ${item.isSent ? 'active' : ''}" 
                                onclick="toggleStatus(${item.id}, 'isSent')" title="Connection Sent">✓</button>
                        <button class="tick-circle tick-accepted ${item.isMade ? 'active' : ''}" 
                                onclick="toggleStatus(${item.id}, 'isMade')" title="Connection Made">✓</button>
                    </div>
                </td>
                <td>
                    ${item.link ? `<a href="${item.link}" target="_blank" class="ln-link">View Profile</a>` : '<span class="sub-text">No Link</span>'}
                </td>
                <td class="action-btns">
                    <button class="icon-btn" onclick="openModal(${item.id})">🗑️</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function toggleStatus(id, property) {
        const index = connections.findIndex(c => c.id === id);
        connections[index][property] = !connections[index][property];
        saveData();
        renderAll();
    }

    function saveData() {
        localStorage.setItem('masterNetwork', JSON.stringify(connections));
    }

    function filterTable() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const rows = document.querySelectorAll('#tableBody tr');
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.classList.toggle('hidden', !text.includes(q));
        });
    }

    function sortData() {
        connections.sort((a, b) => a.name.localeCompare(b.name));
        saveData();
        renderAll();
    }

    function openModal(id) {
        deleteId = id;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        deleteId = null;
    }

    document.getElementById('confirmDelete').onclick = () => {
        connections = connections.filter(c => c.id !== deleteId);
        saveData();
        renderAll();
        closeModal();
    };

    function exportData() {
        const blob = new Blob([JSON.stringify(connections)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "network_backup.json";
        a.click();
    }
</script>
</body>
</html>
