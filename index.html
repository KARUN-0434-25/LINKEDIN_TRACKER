<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Network Core</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Linkedin | Network-Coneection Details</h2>

    <div class="form-section">
        <input type="text" id="newName" placeholder="Full Name">
        <input type="text" id="newCollege" placeholder="College/Org">
        <input type="text" id="newPost" placeholder="Quality (High/Mid)">
        <div class="form-group">
            <input type="text" id="newLink" placeholder="LinkedIn URL">
            <button class="add-btn-circle" onclick="saveAndAdd()" title="Add Connection">+</button>
        </div>
    </div>

    <div class="search-sort-row">
        <input type="text" id="searchInput" placeholder="Search connections..." onkeyup="filterCards()">
        <button class="sort-btn" onclick="sortConnections()">Sort A-Z</button>
    </div>

    <div class="grid" id="mainGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>Delete Connection?</h3>
        <p>This action cannot be undone.</p>
        <div class="modal-btns">
            <button class="confirm-btn btn-yes" id="confirmDelete">Yes, Delete</button>
            <button class="confirm-btn btn-no" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
